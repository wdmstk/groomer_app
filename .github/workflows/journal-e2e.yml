name: Journal E2E

on:
  pull_request:
    paths:
      - 'groomer_app/e2e/journal-pages.spec.ts'
      - 'groomer_app/src/app/journal/**'
      - 'groomer_app/src/app/shared/journal/**'
      - 'groomer_app/src/components/journal/**'
      - 'groomer_app/src/lib/journal/**'
      - 'groomer_app/src/lib/e2e/journal-page-fixtures.ts'
      - 'groomer_app/playwright.config.ts'
      - '.github/workflows/journal-e2e.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'groomer_app/e2e/journal-pages.spec.ts'
      - 'groomer_app/src/app/journal/**'
      - 'groomer_app/src/app/shared/journal/**'
      - 'groomer_app/src/components/journal/**'
      - 'groomer_app/src/lib/journal/**'
      - 'groomer_app/src/lib/e2e/journal-page-fixtures.ts'
      - 'groomer_app/playwright.config.ts'
      - '.github/workflows/journal-e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: journal-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: groomer_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: groomer_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run journal unit tests
        run: npm test -- tests/journal.*.test.ts

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: groomer_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: groomer_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run journal E2E
        run: npm run test:e2e -- e2e/journal-pages.spec.ts
